<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ram Store Tharad | Pro Developing </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fefaf5;
            color: #2c1a0e;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Navbar fixed */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9rem 2rem;
            background: rgba(255, 252, 248, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #f0e2d4;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #b55b2c, #7b3a1a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo i { background: none; color: #b85b28; font-size: 1.8rem; }
        .admin-badge {
            background: #2c1a0e;
            color: #f0cfb5;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 40px;
            margin-left: 10px;
        }

        .right-icons { display: flex; align-items: center; gap: 1.5rem; }
        .profile-btn {
            background: #f3e5da;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #6b3e1c;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e6cfbc;
        }
        .profile-btn:hover { background: #e9d4c2; transform: scale(1.02); }
        .cart-wrapper { position: relative; cursor: pointer; }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #e05a2a;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MAIN CONTENT - FLEX CENTERED, NO SCROLL */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            overflow: hidden;
        }

        /* PRODUCTS GRID - EXACT 4 PRODUCTS IN ONE ROW, NO WRAP, NO SCROLL */
        .products {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: stretch;
            gap: 2rem;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: nowrap;
            overflow-x: visible;
        }

        .product-card {
            flex: 1;
            min-width: 240px;
            max-width: 320px;
            background: white;
            border-radius: 36px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            transition: transform 0.25s ease, box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid #f1e4d9;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover { transform: translateY(-8px); box-shadow: 0 22px 32px rgba(0, 0, 0, 0.12); }

        .product-img {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        .product-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #b5521d;
        }

        .product-info {
            padding: 1rem 1.2rem 1.3rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-title { font-weight: 800; font-size: 1.2rem; margin-bottom: 4px; }
        .product-desc { font-size: 0.75rem; color: #7c5e44; margin: 6px 0 8px; line-height: 1.3; }
        .price-row { display: flex; justify-content: space-between; align-items: baseline; margin: 10px 0 12px; }
        .price { font-weight: 800; font-size: 1.4rem; color: #b5521d; }

        .buy-btn {
            background: #2c1a0e;
            border: none;
            padding: 10px 0;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            margin-top: auto;
        }

        .buy-btn:hover { background: #9b4a1c; gap: 12px; }

        /* PREVIEW MODAL */
        .preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .preview-modal.active { visibility: visible; opacity: 1; }
        .preview-container {
            background: white;
            width: 90%;
            max-width: 1000px;
            border-radius: 48px;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.4);
            animation: zoomFade 0.3s ease;
        }
        @keyframes zoomFade { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .preview-image {
            flex: 1.2;
            min-width: 260px;
            background-size: cover;
            background-position: center;
            min-height: 360px;
        }
        .preview-details {
            flex: 1;
            padding: 2rem;
            background: #fffefb;
        }
        .preview-details h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
        .preview-price { font-size: 1.8rem; font-weight: 800; color: #b5521d; margin: 1rem 0; }
        .preview-desc { color: #5e4030; line-height: 1.5; margin: 1rem 0 1.5rem; }
        .preview-actions { display: flex; gap: 14px; margin-top: 1.5rem; flex-wrap: wrap; }
        .preview-add { background: #2c1a0e; border: none; padding: 12px 24px; border-radius: 60px; color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .preview-close { background: #f0e2d4; border: none; padding: 12px 24px; border-radius: 60px; font-weight: 600; cursor: pointer; }

        /* DRAWERS */
        .profile-drawer, .cart-drawer {
            position: fixed;
            top: 0;
            right: -550px;
            width: 100%;
            max-width: 550px;
            height: 100vh;
            background: white;
            box-shadow: -8px 0 36px rgba(0, 0, 0, 0.15);
            z-index: 200;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            border-radius: 32px 0 0 32px;
        }
        .profile-drawer.open, .cart-drawer.open { right: 0; }
        .profile-header, .cart-header { padding: 1.2rem 1.5rem; border-bottom: 1px solid #f0e2d4; display: flex; justify-content: space-between; align-items: center; }
        .order-history-section { flex: 1; overflow-y: auto; padding: 1rem; }
        .tracking-card { background: white; border-radius: 28px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #f0e2d4; }
        .progress-container { position: relative; margin: 1rem 0; }
        .progress-steps { display: flex; justify-content: space-between; }
        .step { flex: 1; text-align: center; }
        .step-icon { width: 40px; height: 40px; background: #f0e2d4; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; font-size: 1rem; }
        .step.active .step-icon { background: #b5521d; color: white; }
        .step.completed .step-icon { background: #2c7a2c; color: white; }
        .cart-items-list { flex: 1; overflow-y: auto; padding: 1rem; }
        .cart-item { background: #fefaf7; border-radius: 24px; padding: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; }
        .checkout-btn { background: #b5521d; width: 100%; padding: 14px; border-radius: 60px; border: none; color: white; font-weight: 700; cursor: pointer; }
        .step-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            visibility: hidden;
            opacity: 0;
        }
        .step-modal.active { visibility: visible; opacity: 1; }
        .step-card { background: white; width: 90%; max-width: 500px; border-radius: 48px; padding: 2rem; }
        .address-group input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 60px; border: 1px solid #e9dbcf; }
        .profile-address-area { background: #fff7f0; padding: 0.8rem; border-radius: 24px; margin: 0 1rem 1rem 1rem; border: 1px solid #f0dfcf; }
        footer { background: #f6ede5; text-align: center; padding: 0.6rem; font-size: 0.7rem; flex-shrink: 0; }
        .auto-fill-badge { background: #e0f0e0; color: #2c6e2c; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        .spinner { width: 18px; height: 18px; border: 2px solid white; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 1100px) {
            .products { gap: 1.2rem; }
            .product-card { min-width: 210px; }
            .product-img { height: 170px; }
        }
        @media (max-width: 900px) {
            .main-content { padding: 0.5rem; }
            .products { gap: 0.8rem; }
            .product-card { min-width: 180px; }
            .product-title { font-size: 1rem; }
            .price { font-size: 1.2rem; }
        }
        @media (max-width: 700px) {
            .preview-container { flex-direction: column; }
            .products { flex-wrap: wrap; justify-content: center; overflow-y: auto; }
            body { overflow: auto; height: auto; }
            .main-content { overflow-y: auto; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo"><i class="fas fa-seedling"></i> Ram Store <span class="admin-badge"><i class="fas fa-tag"></i> RAM+</span></div>
    <div class="right-icons">
        <div class="profile-btn" id="profileBtn"><i class="fas fa-user-circle"></i></div>
        <div class="cart-wrapper" id="cartIcon">
            <i class="fas fa-bag-shopping" style="font-size: 1.5rem;"></i>
            <span id="cartCountBadge" class="cart-count">0</span>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="products" id="productsGrid"></div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="preview-modal">
    <div class="preview-container">
        <div class="preview-image" id="previewImg"></div>
        <div class="preview-details">
            <h2 id="previewName">Elaichi Thekua</h2>
            <div class="preview-price" id="previewPrice">₹299</div>
            <div class="preview-desc" id="previewDesc">Handcrafted crispy cookies with cardamom infusion.</div>
            <div class="preview-actions">
                <button class="preview-add" id="previewAddToCartBtn"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                <button class="preview-close" id="previewCloseBtn">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Profile Drawer -->
<div id="profileDrawer" class="profile-drawer">
    <div class="profile-header"><h3><i class="fas fa-user-circle"></i> My Profile</h3><button onclick="closeProfileDrawer()" style="background:none;font-size:1.8rem;">&times;</button></div>
    <div class="profile-user-info" style="padding:1rem; background:#faf3eb; text-align:center;">
        <div class="profile-avatar"><i class="fas fa-user-circle fa-3x"></i></div>
        <div id="profileEmailDisplay" style="font-weight:600;">Not logged in</div>
    </div>
    <div class="profile-address-area" id="profileAddressContainer">
        <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;"><i class="fas fa-map-pin" style="color:#b5521d;"></i> <strong>Saved Delivery Address</strong></div>
        <div id="savedAddressDisplay" style="font-size:0.85rem; color:#4a2c18;">No saved address yet.</div>
        <button id="editAddressFromProfile" style="margin-top:8px; background:#e9dbcf; border:none; padding:5px 12px; border-radius:40px; font-size:0.7rem; cursor:pointer;"><i class="fas fa-edit"></i> Update Address</button>
    </div>
    <div class="order-history-section"><div class="order-history-title"><i class="fas fa-truck"></i> My Orders & Tracking</div><div id="orderHistoryList">Login to see orders</div></div>
    <button class="profile-action-btn" id="profileLoginBtn" style="margin:8px 1rem; background:#f3e5da; padding:12px; border-radius:60px;"><i class="fas fa-sign-in-alt"></i> Login</button>
    <button class="profile-action-btn logout" id="profileLogoutBtn" style="display:none; background:#e05a2a; color:white; margin:8px 1rem;"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>

<!-- Cart Drawer -->
<div id="cartDrawer" class="cart-drawer">
    <div class="cart-header"><h3><i class="fas fa-shopping-bag"></i> Cart</h3><button onclick="closeCartDrawer()" style="background:none;font-size:1.8rem;">&times;</button></div>
    <div class="cart-items-list" id="cartItemsList">Empty</div>
    <div class="cart-footer" style="padding:1.2rem; border-top:1px solid #eedfcb;">
        <div class="cart-total" style="display:flex; justify-content:space-between;"><span>Total</span><span id="cartTotalPrice">₹0</span></div>
        <button class="checkout-btn" id="checkoutBtn">Proceed →</button>
    </div>
</div>

<!-- Address Modal -->
<div id="addressModal" class="step-modal">
    <div class="step-card">
        <h2><i class="fas fa-location-dot"></i> Delivery Address</h2>
        <div id="autoFillHint" style="font-size:0.75rem; color:#b5521d; margin-bottom:8px;"></div>
        <div class="address-group">
            <input type="text" id="houseNo" placeholder="House / Flat No." autocomplete="off">
            <input type="text" id="villageTaluka" placeholder="Village / Taluka" autocomplete="off">
            <input type="text" id="cityDistrict" placeholder="City / District" autocomplete="off">
            <input type="text" id="state" placeholder="State" autocomplete="off">
            <input type="text" id="pincode" placeholder="Pincode" autocomplete="off">
        </div>
        <div class="step-buttons" style="display:flex; gap:12px;">
            <button class="step-btn secondary" onclick="closeAddressModal()" style="flex:1; background:#e9dfd6;">Back</button>
            <button class="step-btn primary" id="placeOrderBtn" style="flex:1; background:#b5521d; color:white;">Place Order & Save Address</button>
        </div>
    </div>
</div>

<footer><i class="fas fa-truck"></i> Ram Store Tharad | Power by www.prodeveloping.online</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, orderBy, query, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCIe9xLDNE7keqjXLmvR3xHVXqPp-ZrYwo",
        authDomain: "order-96de7.firebaseapp.com",
        projectId: "order-96de7",
        storageBucket: "order-96de7.firebasestorage.app",
        messagingSenderId: "373948973174",
        appId: "1:373948973174:web:e93cafd6c84b38706ddf57"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 4 Products only
    const products = [
{ id: 1, name: "Masala Khakhra Pack", price: 199, description: "Crispy roasted khakhra with authentic Gujarati masala taste.", image: "https://images.pexels.com/photos/4958792/pexels-photo-4958792.jpeg", badge: "Gujarati Special" },

{ id: 2, name: "Namkeen Mixture Combo", price: 249, description: "Crunchy farsan mixture with peanuts & sev. Classic spicy snack.", image: "https://images.pexels.com/photos/1618898/pexels-photo-1618898.jpeg", badge: "Spicy Crunch" },

{ id: 3, name: "Peanut Chikki Bites", price: 179, description: "Traditional jaggery peanut chikki packed with natural sweetness.", image: "https://images.pexels.com/photos/4110004/pexels-photo-4110004.jpeg", badge: "Energy Boost" },

{ id: 4, name: "Premium Dry Fruit Ladoo", price: 299, description: "Rich dry fruit laddoos made with almonds & cashews.", image: "https://images.pexels.com/photos/6646356/pexels-photo-6646356.jpeg", badge: "Healthy Sweet" }
];
    let cartItems = [];
    let currentUser = null;
    let currentPreviewProduct = null;

    // Address functions
    async function saveUserAddress(addressObj) {
        if (!currentUser) return;
        const userRef = doc(db, "users", currentUser.uid);
        await setDoc(userRef, { savedAddress: addressObj, email: currentUser.email }, { merge: true });
    }
    async function loadUserAddress() {
        if (!currentUser) return null;
        const userRef = doc(db, "users", currentUser.uid);
        const snap = await getDoc(userRef);
        if (snap.exists() && snap.data().savedAddress) return snap.data().savedAddress;
        return null;
    }
    async function autoFillAddressModal() {
        const savedAddr = await loadUserAddress();
        if (savedAddr) {
            document.getElementById("houseNo").value = savedAddr.house || "";
            document.getElementById("villageTaluka").value = savedAddr.village || "";
            document.getElementById("cityDistrict").value = savedAddr.city || "";
            document.getElementById("state").value = savedAddr.state || "";
            document.getElementById("pincode").value = savedAddr.pincode || "";
            document.getElementById("autoFillHint").innerHTML = `<i class="fas fa-check-circle"></i> ✨ Saved address auto-filled! You can edit.`;
        } else {
            document.getElementById("autoFillHint").innerHTML = `<i class="fas fa-info-circle"></i> First order? Fill address. It will be saved for next time.`;
        }
    }
    async function updateProfileAddressUI() {
        const container = document.getElementById("savedAddressDisplay");
        if (!currentUser) { container.innerText = "Login to save address"; return; }
        const addr = await loadUserAddress();
        if (addr && addr.full) container.innerHTML = `<i class="fas fa-home"></i> ${addr.full}`;
        else container.innerHTML = "No saved address yet. Complete checkout to save.";
    }
    function formatAddressToString(house, village, city, state, pincode) {
        return `${house}, ${village}, ${city}, ${state} - ${pincode}`;
    }

    // Cart & UI
    function updateCartUI() {
        document.getElementById("cartCountBadge").innerText = cartItems.length;
        if (document.getElementById("cartDrawer").classList.contains("open")) renderCartDrawer();
    }
    function renderCartDrawer() {
        const container = document.getElementById("cartItemsList");
        if (cartItems.length === 0) { container.innerHTML = "<div style='text-align:center;padding:2rem;'>Cart empty</div>"; document.getElementById("cartTotalPrice").innerText = "₹0"; return; }
        let total = 0, html = "";
        cartItems.forEach((item, idx) => { total += item.product.price; html += `<div class="cart-item"><span><b>${item.product.name}</b> ₹${item.product.price}</span><button onclick="window.removeCartItem(${idx})" style="background:none;border:none;color:#bf7b50;"><i class="fas fa-trash"></i></button></div>`; });
        container.innerHTML = html;
        document.getElementById("cartTotalPrice").innerText = `₹${total}`;
    }
    window.removeCartItem = (idx) => { cartItems.splice(idx, 1); updateCartUI(); };
    window.addCart = (product) => { if(!currentUser) { alert("Please login first"); return false; } cartItems.push({ product: {...product} }); updateCartUI(); return true; };
    window.openCartDrawer = () => { if(currentUser) { renderCartDrawer(); document.getElementById("cartDrawer").classList.add("open"); } else alert("Login first"); };
    window.closeCartDrawer = () => document.getElementById("cartDrawer").classList.remove("open");
    window.openAddressModal = async () => { if(cartItems.length===0) alert("Cart empty"); else if(!currentUser) alert("Login first"); else { closeCartDrawer(); await autoFillAddressModal(); document.getElementById("addressModal").classList.add("active"); } };
    window.closeAddressModal = () => document.getElementById("addressModal").classList.remove("active");

    function openProfileDrawer() { document.getElementById("profileDrawer").classList.add("open"); if(currentUser) { loadOrderHistory(); updateProfileAddressUI(); } }
    function closeProfileDrawer() { document.getElementById("profileDrawer").classList.remove("open"); }
    document.getElementById("profileBtn").onclick = openProfileDrawer;
    window.closeProfileDrawer = closeProfileDrawer;
    document.getElementById("editAddressFromProfile").onclick = () => { closeProfileDrawer(); window.openAddressModal(); };

    // Order ID generator
    const ID_PREFIX = "RAM";
    const START_NUM = 1;
    function extractNumber(track) { if(!track?.startsWith(ID_PREFIX)) return null; return parseInt(track.substring(3),10); }
    function formatNum(num) { return `${ID_PREFIX}${num.toString().padStart(2,"0")}`; }
    async function fetchAllTrackingNumbers() { const snap = await getDocs(collection(db,"orders")); let nums=[]; snap.forEach(d=>{ let num=extractNumber(d.data().trackingNumber); if(num!==null) nums.push(num); }); nums.sort((a,b)=>a-b); return nums; }
    async function generateTrackingNumber() { const existing = await fetchAllTrackingNumbers(); let expected=START_NUM; for(let n of existing){ if(n>expected) return formatNum(expected); if(n===expected) expected++; } return formatNum(expected); }

    async function loadOrderHistory() {
        if(!currentUser) { document.getElementById("orderHistoryList").innerHTML="Login to see orders"; return; }
        document.getElementById("orderHistoryList").innerHTML="<div style='text-align:center;'><i class='fas fa-spinner fa-pulse'></i> Loading...</div>";
        try {
            const q = query(collection(db,"orders"), orderBy("date","desc"));
            const snap = await getDocs(q);
            const userOrders=[];
            snap.forEach(doc=>{ let o=doc.data(); if(o.customerEmail===currentUser.email) userOrders.push({id:doc.id,...o}); });
            if(userOrders.length===0) { document.getElementById("orderHistoryList").innerHTML="<div style='padding:2rem;text-align:center;'>✨ No orders yet. Shop now!</div>"; return; }
            let html="";
            const steps=["ordered","shipped","out_for_delivery","delivered"];
            const stepLabels={ordered:"Ordered",shipped:"Shipped",out_for_delivery:"Out for delivery",delivered:"Delivered"};
            const icons={ordered:"fa-clipboard-list",shipped:"fa-box",out_for_delivery:"fa-truck",delivered:"fa-check-circle"};
            userOrders.forEach(order=>{
                const status=order.trackingStatus||"ordered";
                const activeIdx=steps.indexOf(status);
                const percent=(activeIdx/(steps.length-1))*100;
                html+=`<div class="tracking-card"><div style="display:flex; justify-content:space-between;"><div style="background:#2c1a0e;padding:4px 12px;border-radius:30px;color:white;">Order: ${order.trackingNumber||"RAMxx"}</div><div class="order-status-text status-${status.replace(/_/g,'-')}">${stepLabels[status]}</div></div>
                <div class="progress-container"><div style="position:absolute; top:25px; left:0; right:0; height:4px; background:#e9cfbb;"></div><div style="position:absolute; top:25px; left:0; width:${percent}%; height:4px; background:#b5521d;"></div>
                <div class="progress-steps">${steps.map((s,i)=>{ let cls="step"; if(i<activeIdx) cls+=" completed"; if(i===activeIdx) cls+=" active"; return `<div class="${cls}"><div class="step-icon"><i class="fas ${icons[s]}"></i></div><div class="step-label">${stepLabels[s]}</div></div>`; }).join('')}</div></div>
                <div class="order-details-mini" style="font-size:0.8rem;"><strong>Items:</strong> ${order.items?.map(i=>`${i.name}`).join(", ")} | <strong>Total:</strong> ₹${order.totalAmount}</div></div>`;
            });
            document.getElementById("orderHistoryList").innerHTML=html;
        } catch(e){ document.getElementById("orderHistoryList").innerHTML="<div style='color:red;'>Error</div>"; }
    }

    window.placeOrder = async () => {
        const house=document.getElementById("houseNo").value.trim(), village=document.getElementById("villageTaluka").value.trim(), city=document.getElementById("cityDistrict").value.trim(), state=document.getElementById("state").value.trim(), pincode=document.getElementById("pincode").value.trim();
        if(!house||!village||!city||!state||!pincode) { alert("Fill all address fields"); return; }
        if(!/^\d{6}$/.test(pincode)) { alert("Invalid pincode"); return; }
        const btn=document.getElementById("placeOrderBtn");
        btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Placing...';
        const fullAddress = formatAddressToString(house, village, city, state, pincode);
        const addressObj = { house, village, city, state, pincode, full: fullAddress };
        if(currentUser) await saveUserAddress(addressObj);
        const orderItems=cartItems.map(i=>({name:i.product.name, price:i.product.price}));
        const total=cartItems.reduce((s,i)=>s+i.product.price,0);
        const trackingNumber=await generateTrackingNumber();
        try {
            await addDoc(collection(db,"orders"),{ customerEmail:currentUser.email, customerName:currentUser.email.split('@')[0], address:fullAddress, items:orderItems, totalAmount:total, status:"Ordered", date:new Date(), trackingStatus:"ordered", trackingNumber, parcelTrackingNumber:null });
            alert(`✅ Order placed! ID: ${trackingNumber}\nAddress saved for auto-fill next time!`);
            cartItems=[]; updateCartUI(); closeAddressModal();
            document.querySelectorAll("#addressModal input").forEach(inp=>inp.value="");
            if(document.getElementById("profileDrawer").classList.contains("open")) { loadOrderHistory(); updateProfileAddressUI(); }
        } catch(e){ alert("Error: "+e.message); }
        finally{ btn.disabled=false; btn.innerHTML="Place Order & Save Address"; }
    };
    document.getElementById("placeOrderBtn").onclick = window.placeOrder;
    document.getElementById("checkoutBtn").onclick = window.openAddressModal;
    document.getElementById("cartIcon").onclick = window.openCartDrawer;

    // Auth
    let authModalEl=null;
    function showAuthModal(loginMode=true){
        if(authModalEl) authModalEl.remove();
        const div=document.createElement("div"); div.className="step-modal";
        div.innerHTML=`<div class="step-card"><i class="fas ${loginMode?'fa-lock':'fa-user-plus'}" style="font-size:2rem;color:#b5521d;"></i><h2>${loginMode?'Login':'Register'}</h2>
        <div class="address-group">${!loginMode?'<input id="regName" placeholder="Full Name">':''}<input id="authEmail" placeholder="Email"><input id="authPassword" type="password" placeholder="Password">${!loginMode?'<input id="confirmPassword" type="password" placeholder="Confirm Password">':''}</div>
        <div class="step-buttons"><button id="authSubmitBtn" class="step-btn primary">${loginMode?'Login':'Register'}</button><button id="cancelAuthBtn" class="step-btn secondary">Cancel</button></div>
        <div class="toggle-auth">${loginMode?"Don't have account? ":"Already have account? "}<a id="toggleAuthMode">${loginMode?'Register here':'Login here'}</a></div></div>`;
        document.body.appendChild(div); authModalEl=div; setTimeout(()=>div.classList.add("active"),10);
        document.getElementById("authSubmitBtn").onclick=async()=>{
            const email=document.getElementById("authEmail").value, pass=document.getElementById("authPassword").value;
            if(!email||!pass){alert("Fill fields");return;}
            if(!loginMode && document.getElementById("confirmPassword").value!==pass){alert("Passwords mismatch");return;}
            try{
                if(loginMode) await signInWithEmailAndPassword(auth,email,pass);
                else await createUserWithEmailAndPassword(auth,email,pass);
                alert(loginMode?"Welcome! 🎉":"Account created! 🎉");
                div.classList.remove("active"); setTimeout(()=>div.remove(),300);
                closeProfileDrawer();
            } catch(e){ alert("Error: "+e.message); }
        };
        document.getElementById("cancelAuthBtn").onclick=()=>{ div.classList.remove("active"); setTimeout(()=>div.remove(),300); };
        document.getElementById("toggleAuthMode").onclick=()=>{ div.classList.remove("active"); setTimeout(()=>{ div.remove(); showAuthModal(!loginMode); },300); };
    }
    document.getElementById("profileLoginBtn").onclick=()=>showAuthModal(true);
    document.getElementById("profileLogoutBtn").onclick=async()=>{ await signOut(auth); cartItems=[]; updateCartUI(); closeProfileDrawer(); alert("Logged out"); };

    // Preview
    function openPreview(product){
        currentPreviewProduct=product;
        const modal=document.getElementById("previewModal");
        document.getElementById("previewImg").style.backgroundImage=`url(${product.image})`;
        document.getElementById("previewName").innerText=product.name;
        document.getElementById("previewPrice").innerHTML=`₹${product.price}`;
        document.getElementById("previewDesc").innerText=product.description;
        modal.classList.add("active");
    }
    document.getElementById("previewCloseBtn").onclick=()=>document.getElementById("previewModal").classList.remove("active");
    document.getElementById("previewAddToCartBtn").onclick=()=>{
        if(currentPreviewProduct && window.addCart(currentPreviewProduct)) alert(`${currentPreviewProduct.name} added to cart`);
        else if(!currentUser) alert("Please login first");
        document.getElementById("previewModal").classList.remove("active");
    };

    function renderProducts(){
        const container=document.getElementById("productsGrid");
        container.innerHTML="";
        products.forEach(p=>{
            const card=document.createElement("div");
            card.className="product-card";
            card.innerHTML=`
                <div class="product-img" style="background-image:url('${p.image}');"><div class="product-badge">${p.badge}</div></div>
                <div class="product-info">
                    <div class="product-title">${p.name}</div>
                    <div class="product-desc">${p.description.substring(0,55)}...</div>
                    <div class="price-row"><span class="price">₹${p.price}</span></div>
                    <button class="buy-btn"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                </div>
            `;
            const btn=card.querySelector(".buy-btn");
            btn.onclick=(e)=>{ e.stopPropagation(); window.addCart(p); };
            card.onclick=(e)=>{ if(e.target!==btn && !btn.contains(e.target)) openPreview(p); };
            container.appendChild(card);
        });
    }
    renderProducts();

    onAuthStateChanged(auth, async(user)=>{
        currentUser=user;
        if(user){
            document.getElementById("profileEmailDisplay").innerText=user.email;
            document.getElementById("profileLoginBtn").style.display="none";
            document.getElementById("profileLogoutBtn").style.display="block";
            await loadOrderHistory();
            await updateProfileAddressUI();
        } else {
            document.getElementById("profileEmailDisplay").innerText="Not logged in";
            document.getElementById("profileLoginBtn").style.display="block";
            document.getElementById("profileLogoutBtn").style.display="none";
            document.getElementById("orderHistoryList").innerHTML="Login to track orders";
            document.getElementById("savedAddressDisplay").innerHTML="Login to save address";
            cartItems=[]; updateCartUI();
        }
    });
    updateCartUI();
</script>
</body>
</html>
